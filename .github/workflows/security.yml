# Snyk による依存脆弱性の CI ゲート（F-4 の恒常化）。
# high 以上の既知脆弱性が混入した場合に CI を失敗させ、マージをブロックする。
# 参考手法: Classmethod「Snyk + GitHub Actions で脆弱なパッケージの混入を CI で防ぐ」。
#
# サードパーティ Action はサプライチェーン改ざん対策として完全長コミット SHA に固定する
# （タグは移動しうるため）。行末コメントに対応バージョンを併記する。
name: security

on:
  pull_request:
  push:
    branches: [main]

# 同一ブランチの古い実行はキャンセルして無駄な実行を減らす
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # フロントエンド（npm）の依存を Snyk でスキャン
  frontend:
    name: Snyk (frontend / npm)
    runs-on: ubuntu-latest
    # public リポジトリでは fork からの PR に SNYK_TOKEN（secrets）が渡らずジョブが必ず失敗する。
    # そのため fork PR ではスキップし、push と同一リポジトリ内 PR のときだけ実行する。
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ロックファイルどおりに依存を再現（Snyk の解決精度を上げる）
      - name: install deps
        working-directory: frontend
        run: npm ci

      # high 以上で失敗（マージ不可）。moderate 以下は許容する。
      - name: Snyk test (frontend)
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master (2026-07-21 時点)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --severity-threshold=high

  # バックエンド（pip）の依存を Snyk CLI でスキャン
  backend:
    name: Snyk (backend / pip)
    runs-on: ubuntu-latest
    # フロント同様、fork PR ではスキップ（SNYK_TOKEN が渡らないため）
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      # Snyk の pip スキャンはインストール済み環境があると解決精度が上がるため、
      # 先に依存を導入してから requirements.txt を対象にスキャンする。
      - name: install deps
        run: pip install -r backend/requirements.txt

      # Snyk CLI を利用（monorepo でパスを明示できるため確実）。
      # 再現性のため CLI もバージョンを固定する。
      - name: install snyk cli
        run: npm i -g snyk@1.1306.1

      # high 以上で失敗（マージ不可）。
      - name: Snyk test (backend)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=backend/requirements.txt --package-manager=pip --severity-threshold=high
