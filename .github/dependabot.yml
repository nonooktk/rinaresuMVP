# Dependabot: 依存の既知脆弱性・更新を週次で自動 PR 化する（F-4 の恒常化）。
# minor/patch はグループ化して PR 数を抑制し、major は個別 PR として影響を精査する。
version: 2
updates:
  # フロントエンド（npm）
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # minor/patch はまとめて 1 PR に集約
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # バックエンド（pip）
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions 自体の更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
